#
# Totem central dongle (nice_nano_v2 + SH1106 OLED)
# SPDX-License-Identifier: MIT
#

# dongle is central, both halves are peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# raise BLE connection slots: 2 peripherals + 2 host profiles
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# fetch peripheral battery levels over split, expose only via HID
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=n

# OLED display
CONFIG_ZMK_DISPLAY=y
CONFIG_PINCTRL=y

# avoid clearing pairings on dongle boot
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
